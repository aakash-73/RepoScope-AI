name: Deploy RepoScope AI

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ssh.arndevs.com
            HostName ssh.arndevs.com
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ServerAliveCountMax 10
          EOF

      - name: Deploy
        run: |
          ssh ssh.arndevs.com << 'ENDSSH'
            # ── Lock — prevent concurrent deploys ──────────────────────────
            exec 9>/tmp/reposcope-deploy.lock
            flock -w 300 9 || { echo "Deploy timed out waiting for lock."; exit 1; }

            cd ~/RepoScope-AI
            git pull origin main

            # ── Backend — only pip install if requirements.txt changed ─────
            cd backend
            source .venv/bin/activate

            REQ_HASH=$(md5sum requirements.txt | cut -d' ' -f1)
            LAST_HASH=$(cat /tmp/reposcope_req_hash 2>/dev/null || echo "none")

            if [ "$REQ_HASH" != "$LAST_HASH" ]; then
                echo "requirements.txt changed — running pip install..."
                pip install -r requirements.txt -q --upgrade-strategy only-if-needed
                echo "$REQ_HASH" > /tmp/reposcope_req_hash
            else
                echo "requirements.txt unchanged — skipping pip install."
            fi

            # ── Frontend — only npm install if package.json changed ────────
            cd ../frontend

            PKG_HASH=$(md5sum package.json | cut -d' ' -f1)
            LAST_PKG_HASH=$(cat /tmp/reposcope_pkg_hash 2>/dev/null || echo "none")

            if [ "$PKG_HASH" != "$LAST_PKG_HASH" ]; then
                echo "package.json changed — running npm install..."
                npm install --prefer-offline
                echo "$PKG_HASH" > /tmp/reposcope_pkg_hash
            else
                echo "package.json unchanged — skipping npm install."
            fi

            npm run build

            # ── Restart services ───────────────────────────────────────────
            cd ..
            pm2 restart reposcope-backend
            pm2 restart reposcope-frontend
            pm2 save

            echo "Deployed successfully!"
          ENDSSH